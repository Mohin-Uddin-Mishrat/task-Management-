services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${PACKAGE_NAME:-task}_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT:-5000}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/${POSTGRES_DB:-task_db}
      SALT_ROUND: ${SALT_ROUND:-10}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-local-access-secret}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-local-refresh-secret}
      ACCESS_TOKEN_EXPIREIN: ${ACCESS_TOKEN_EXPIREIN:-3650d}
      REFRESH_TOKEN_EXPIREIN: ${REFRESH_TOKEN_EXPIREIN:-30d}
      email: ${ADMIN_EMAIL:-admin@example.com}
      name: ${ADMIN_NAME:-admin}
      password: ${ADMIN_PASSWORD:-123456}
      role: ${ADMIN_ROLE:-ADMIN}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - uploads_data:/app/uploads

  db:
    image: postgres:17
    container_name: ${PACKAGE_NAME:-task}_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-task_db}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-task_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    profiles: ["tools"]
    image: dpage/pgadmin4:9
    container_name: ${PACKAGE_NAME:-task}_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PGADMIN_PORT:-8123}:80"

volumes:
  postgres_data:
  uploads_data:
